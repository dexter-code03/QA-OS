name: Katalon Test Suite — QA AI Automation

on:
  pull_request:
    branches: [main, staging]       # → smoke suite on every PR
  push:
    branches: [main]                # → regression suite on merge
  schedule:
    - cron: '0 2 * * *'             # → full nightly at 2am UTC
  workflow_dispatch:                 # → manual trigger, choose suite
    inputs:
      suite:
        description: 'Test suite to run'
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - full

env:
  KATALON_VERSION: '9.x'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Run Katalon tests in parallel browsers
  # ─────────────────────────────────────────────
  katalon:
    name: Katalon · ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false               # Don't cancel other browsers on failure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine test suite
        id: suite
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=smoke" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "name=regression" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "name=full" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.inputs.suite || 'smoke' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Katalon tests
        uses: katalon-studio/katalon-studio-github-action@v3
        with:
          version: ${{ env.KATALON_VERSION }}
          projectPath: ${{ github.workspace }}
          args: >
            -retry=1
            -retryFailedTestCases=true
            -browserType="${{ matrix.browser }}"
            -executionProfile="${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"
            -testSuitePath="Test Suites/${{ steps.suite.outputs.name }}"
            -apiKey="${{ secrets.KATALON_API_KEY }}"

      - name: Upload Katalon results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: katalon-results-${{ matrix.browser }}
          path: Reports/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 2: AI triage + pipeline gate
  # ─────────────────────────────────────────────
  triage:
    name: AI Bug Triage & Gate
    needs: katalon
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Chrome results
        uses: actions/download-artifact@v4
        with:
          name: katalon-results-chrome
          path: Reports/chrome/

      - name: Download Firefox results
        uses: actions/download-artifact@v4
        with:
          name: katalon-results-firefox
          path: Reports/firefox/

      - name: Run AI triage and gate check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PASS_RATE_THRESHOLD: '95'
        run: |
          python scripts/triage_and_gate.py \
            --results-dir Reports/ \
            --pass-threshold $PASS_RATE_THRESHOLD \
            --block-on-critical

  # ─────────────────────────────────────────────
  # Job 3: Sign-off report (nightly/manual only)
  # ─────────────────────────────────────────────
  signoff:
    name: QA Sign-off Report
    needs: triage
    if: >
      always() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish sign-off report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          KATALON_API_KEY: ${{ secrets.KATALON_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python scripts/signoff_pipeline.py \
            --sprint-id "${{ vars.CURRENT_SPRINT_ID }}" \
            --fix-version "${{ github.ref_name }}"
